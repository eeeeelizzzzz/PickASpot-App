kind = "web"
previewPath = "/"
title = "OK Eats"
version = "1.0.0"
id = "artifacts/ok-eats"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24727

[services.development]
run = "pnpm --filter @workspace/ok-eats run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ok-eats", "run", "build" ]
publicDir = "artifacts/ok-eats/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24727"
BASE_PATH = "/"
